<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Management System</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <nav class="navbar">
      <div class="navbar-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
        </svg>
        <span>EMS</span>
      </div>
      <div class="nav-tabs" id="nav-tabs">
        <button class="nav-tab active" data-tab="equipment">Equipment</button>
        <button class="nav-tab" data-tab="categories">Categories</button>
      </div>
    </nav>
    <main id="main"></main>
  </div>

  <div id="modal-backdrop" class="modal-backdrop hidden">
    <div class="modal" id="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
